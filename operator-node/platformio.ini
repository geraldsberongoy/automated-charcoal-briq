; ============================================================================
; PlatformIO Project Configuration — ESP32 Operator Node (Captive Portal)
; Target  : DOIT ESP32 DEVKIT V1
; Framework: Arduino Core for ESP32
; Author  : Operator Node Firmware Team
; ============================================================================

[platformio]
default_envs = esp32doit-devkit-v1
description   = ESP32 Captive-Portal Operator Dashboard Node
; Source & include directories (PlatformIO defaults — explicit for clarity)
src_dir  = src
include_dir = include

; LittleFS partition root — populated by `npm run build` inside dashboard/
; Upload via: PlatformIO → "Upload Filesystem Image"
data_dir = data

; ----------------------------------------------------------------------------
; Primary Build Environment
; ----------------------------------------------------------------------------
[env:esp32doit-devkit-v1]
platform              = espressif32
board                 = esp32doit-devkit-v1
framework             = arduino

; Use LittleFS for internal flash filesystem (wear-leveling, power-loss safe)
board_build.filesystem = littlefs

; Serial monitor baud rate — must match Serial.begin() in firmware
monitor_speed         = 115200

; Upload speed (optional — reduce if uploads fail on noisy USB)
upload_speed          = 921600

; Compiler flags — enable verbose logging macro and C++17 features
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
    -Wall
    -DLITTLEFS_ENABLED=1

; Build type — use release for production, debug for development
build_type = debug

; Libraries used:
;   WiFi.h       — SoftAP & TCP/IP (LwIP) abstraction
;   DNSServer.h  — UDP Port 53 DNS hijacking
;   WebServer.h  — HTTP server & 302 redirect logic
;   LittleFS.h   — Internal flash filesystem (part of ESP32 Arduino core)
